<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow the service to own its bus name.
       Ownership is not restricted to a specific user because the service
       runs under DynamicUser= and systemd hardening already limits access. -->
  <policy context="default">
    <allow own="org.gnome.BluetoothRSSI"/>
  </policy>

  <!-- Allow any logged-in user to call methods and receive signals -->
  <policy context="default">
    <allow send_destination="org.gnome.BluetoothRSSI"
           send_interface="org.gnome.BluetoothRSSI"/>
    <allow receive_sender="org.gnome.BluetoothRSSI"
           receive_interface="org.gnome.BluetoothRSSI"/>
    <allow send_destination="org.gnome.BluetoothRSSI"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="org.gnome.BluetoothRSSI"
           send_interface="org.freedesktop.DBus.Properties"/>
  </policy>
</busconfig>
